# Green Earth local development environment (issue api#268).
#
# Orchestrated by ./devctl — don't run `docker compose` directly unless you
# know what you're doing; devctl sequences es-init (which mints the ES API
# keys the other services read from .runtime/) before starting the api.
#
# Source repos are bind-mounted from sibling checkouts of this repo's parent
# directory (override with GE_DEV_REPO_ROOT). Code lives on the host; only
# execution happens in containers.

name: ${GE_DEV_NAME:-ge-dev}

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    environment:
      - discovery.type=single-node
      - ELASTIC_PASSWORD=${GE_DEV_ES_PASSWORD:-ge-dev-elastic}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms${GE_DEV_ES_HEAP:-1g} -Xmx${GE_DEV_ES_HEAP:-1g}
      - cluster.routing.allocation.disk.watermark.low=95%
      - cluster.routing.allocation.disk.watermark.high=97%
      - cluster.routing.allocation.disk.watermark.flood_stage=98%
    ports:
      - "127.0.0.1:${GE_DEV_PORT_ES:-9201}:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -s -u elastic:$${ELASTIC_PASSWORD} http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(yellow|green)\"'",
        ]
      interval: 60s
      start_period: 60s
      start_interval: 1s
      timeout: 5s
      retries: 60

  # One-shot: applies the prod index templates / ILM policies straight from the
  # ingex checkout, creates initial indexes+aliases, and mints the read-only and
  # read-write ES API keys into .runtime/. Run via `docker compose run --rm es-init`
  # (devctl does this).
  es-init:
    build: ./es-init
    profiles: ["tools"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - GE_ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTIC_PASSWORD=${GE_DEV_ES_PASSWORD:-ge-dev-elastic}
    volumes:
      - ${GE_DEV_REPO_ROOT:-../..}/ingex/index/deploy/k8s/base/templates:/templates:ro
      - ./.runtime:/runtime

  # Firebase emulators (Firestore + Auth + Functions), started from the
  # frontend checkout so rules and function code come from the repo we deploy
  # them from rather than a copy maintained here (frontend#42, api#301).
  #
  # Port bridging: the emulators bind loopback inside the container, which
  # Docker can't publish (published ports arrive on eth0). socat re-exposes
  # each one on 0.0.0.0 at port+10000, and those are what get published and
  # what other services connect to. The published *host* ports have to be
  # exactly 8080/9099/5001 because the frontend's Firebase SDK hardcodes
  # 127.0.0.1 at those numbers and runs in the developer's browser.
  firebase:
    build: ./images/nodedev
    working_dir: /frontend
    command: ["bash", "/firebase/start.sh"]
    environment:
      - GE_DEV_FIREBASE_PROJECT=${GE_DEV_FIREBASE_PROJECT:-greenearth-471522}
      # --- consumed by functions/src at runtime ---
      # APP_ORIGIN derives the OAuth client_id and redirect_uri. Bluesky's
      # authorization server has to fetch the client metadata from it, so
      # working on real auth means pointing this (and the frontend's allowed
      # hosts) at a public tunnel. See README, "Working on real Bluesky auth".
      - APP_ORIGIN=${GE_DEV_APP_ORIGIN:-http://localhost:${GE_DEV_PORT_FRONTEND:-3000}}
      # Empty by default: the environment runs credential-free, and dev-auth
      # stands in for this flow. Set them in devenv.local.env to use the real
      # one.
      - BLUESKY_OAUTH_CLIENT_KID=${BLUESKY_OAUTH_CLIENT_KID:-}
      - BLUESKY_OAUTH_CLIENT_PRIVATE_KEY=${BLUESKY_OAUTH_CLIENT_PRIVATE_KEY:-}
      - BLUESKY_OAUTH_CLIENT_PRIVATE_KEY_STAGE=${BLUESKY_OAUTH_CLIENT_PRIVATE_KEY_STAGE:-}
      - BLUESKY_OAUTH_PUBLIC_JWKS=${BLUESKY_OAUTH_PUBLIC_JWKS:-}
      - OAUTH_STATE_ENCRYPTION_KEY=${OAUTH_STATE_ENCRYPTION_KEY:-}
    ports:
      - "127.0.0.1:${GE_DEV_PORT_FIRESTORE:-8080}:18080"
      - "127.0.0.1:${GE_DEV_PORT_FIREBASE_AUTH:-9099}:19099"
      - "127.0.0.1:${GE_DEV_PORT_FUNCTIONS:-5001}:15001"
      - "127.0.0.1:${GE_DEV_PORT_FIREBASE_UI:-4000}:14000"
      # The UI loads from 4000 but its Firestore viewer opens a
      # websocket straight to 9150, so that has to be reachable too.
      - "127.0.0.1:${GE_DEV_PORT_FIREBASE_UI_WS:-9150}:19150"
    volumes:
      - ./firebase:/firebase:ro
      - ${GE_DEV_REPO_ROOT:-../..}/frontend:/frontend
      - functions_node_modules:/frontend/functions/node_modules
    healthcheck:
      # Probe through socat, so this only passes once the bridge other services
      # depend on is actually serving.
      test: ["CMD-SHELL", "curl -sf http://localhost:18080/ >/dev/null"]
      interval: 60s
      start_period: 60s
      start_interval: 1s
      timeout: 5s
      retries: 60

  frontend:
    build: ./images/nodedev
    working_dir: /frontend
    command:
      - bash
      - -c
      - |
        set -e
        # vite.config.ts proxies to localhost:8000 (api) and 127.0.0.1:5001
        # (functions), which inside this container would mean this container.
        # Bridge both to the real services rather than patching the frontend
        # repo, which is being actively changed elsewhere.
        socat TCP-LISTEN:8000,fork,reuseaddr,bind=127.0.0.1 TCP:api:8000 &
        socat TCP-LISTEN:5001,fork,reuseaddr,bind=127.0.0.1 TCP:${GE_DEV_FUNCTIONS_TARGET:-dev-auth:8000} &
        # npm ci, not install: install rewrites package-lock.json in the
        # developer's bind-mounted checkout.
        npm ci --no-audit --no-fund
        exec npm run dev -- --host 0.0.0.0 --port 3000
    depends_on:
      firebase:
        condition: service_healthy
      dev-auth:
        condition: service_healthy
    environment:
      # Real services by default. Mock mode is the frontend repo's own
      # default, but here it renders convincing hardcoded feed cards that have
      # nothing to do with the seeded data — which reads as the environment
      # working when it isn't. Set GE_DEV_FRONTEND_MOCK=true for UI work that
      # doesn't need a backend.
      - VITE_USE_MOCK_SERVICES=${GE_DEV_FRONTEND_MOCK:-false}
      - VITE_USE_FIREBASE_EMULATORS=true
      - VITE_FIREBASE_PROJECT_ID=${GE_DEV_FIREBASE_PROJECT:-greenearth-471522}
      # The Firebase JS SDK validates that these are non-empty before it will
      # initialize, even when every call is going to an emulator that ignores
      # them. Placeholders keep real project credentials out of the dev env.
      - VITE_FIREBASE_API_KEY=${GE_DEV_FIREBASE_API_KEY:-ge-dev-fake-api-key}
      - VITE_FIREBASE_AUTH_DOMAIN=${GE_DEV_FIREBASE_PROJECT:-greenearth-471522}.firebaseapp.com
      - VITE_FIREBASE_APP_ID=${GE_DEV_FIREBASE_APP_ID:-1:0:web:gedev}
      - VITE_FIREBASE_MESSAGING_SENDER_ID=${GE_DEV_FIREBASE_SENDER_ID:-0}
      - VITE_ALLOWED_HOSTS=${GE_DEV_FRONTEND_ALLOWED_HOSTS:-localhost}
    ports:
      - "127.0.0.1:${GE_DEV_PORT_FRONTEND:-3000}:3000"
    volumes:
      - ${GE_DEV_REPO_ROOT:-../..}/frontend:/frontend
      - frontend_node_modules:/frontend/node_modules

  # Stands in for the Bluesky OAuth login leg so the frontend's Sign In button
  # works without OAuth secrets; everything else passes through to the real
  # Functions emulator. See dev-auth/app.py.
  dev-auth:
    image: python:3.13-slim
    command: ["python", "/dev-auth/app.py"]
    environment:
      - PYTHONUNBUFFERED=1
      - GE_DEV_FUNCTIONS_UPSTREAM=http://firebase:15001
    volumes:
      - ./dev-auth:/dev-auth:ro
      - ./firebase:/firebase:ro
      - ./.runtime:/runtime:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; socket.create_connection(('localhost', 8000), 2)\"",
        ]
      interval: 60s
      start_period: 60s
      start_interval: 1s
      timeout: 5s
      retries: 24

  # The real inference-service, serving the real trained towers (issue api#269).
  #
  # Model artifacts come from `devctl fetch-models`, which downloads a published
  # release into models/data/. The serving manifests in that bundle name local
  # paths under /models, so this loads plain files — no GCS credentials, no
  # ClearML account, no network.
  #
  # `devctl up --live inference` points the api at a deployed service instead
  # and doesn't start this at all.
  inference:
    build:
      context: ./images/pydev
      args:
        PYTHON_VERSION: "3.11"
    working_dir: /srv
    # See inference/start.sh — `devctl setup` runs the same script with
    # --install-only to pre-warm the venv volume.
    command: ["bash", "/inference/start.sh"]
    environment:
      - PYTHONUNBUFFERED=1
      - GE_DEV_TORCH_VERSION=${GE_DEV_TORCH_VERSION:-2.5.1}
      - PIPENV_VENV_IN_PROJECT=1
      # As with the api: the checkout may carry a developer's own .env pointing
      # at GCS artifacts and real projects. The compose environment wins.
      - PIPENV_DONT_LOAD_ENV=1
      - GE_INFERENCE_API_KEY=${GE_DEV_INFERENCE_API_KEY:-ge-dev-inference}
      # CPU only. The models run acceptably on CPU, and a CUDA torch build
      # would be a multi-GB download for a laptop that can't use it.
      - GE_INFERENCE_PREFER_CUDA=0
      - GE_INFERENCE_WARMUP=0
    env_file:
      # Shipped inside the model bundle and generated from the artifacts
      # themselves (see models/publish_models.sh), so the served dimensions
      # can't drift from the weights. devctl guarantees this file exists.
      - ./models/data/models.env
    volumes:
      - ./inference:/inference:ro
      - ${GE_DEV_REPO_ROOT:-../..}/inference-service:/srv
      - ./models/data:/models:ro
      - inference_venv:/srv/.venv
    healthcheck:
      # /ready, not /health: /health answers before the towers are loaded, and
      # starting the seed against a service that hasn't loaded them yet means
      # posts get indexed with no embedding at all.
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen(urllib.request.Request('http://localhost:8000/ready', headers={'X-API-Key': '${GE_DEV_INFERENCE_API_KEY:-ge-dev-inference}'}))\"",
        ]
      interval: 60s
      # Generous ceiling, not an expected wait: `devctl setup` normally has the
      # venv volume warm, so this starts in seconds. It only matters when
      # someone skips setup and the container installs torch itself.
      start_period: 900s
      start_interval: 2s
      timeout: 10s
      retries: 24

  # Stands in for Google's Perspective API so the `perspective` ranker — and
  # therefore "your-feed" — runs without an external key. See
  # perspective-stub/app.py: scores are deterministic, not real analysis.
  perspective-stub:
    image: python:3.13-slim
    command: ["python", "/stub/perspective_stub.py"]
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./perspective-stub:/stub:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\"",
        ]
      interval: 60s
      start_period: 60s
      start_interval: 1s
      timeout: 5s
      retries: 24

  api:
    build: ./images/pydev
    working_dir: /app
    command:
      - bash
      - -c
      - |
        set -e
        pipenv install --dev
        exec pipenv run uvicorn src.app.main:app --host 0.0.0.0 --port 8000 ${GE_DEV_API_RELOAD:+--reload}
    # perspective-stub and inference are deliberately absent: either can be
    # replaced by a deployed service (`devctl up --live`), and naming one here
    # would start the local container anyway. devctl brings up whichever are
    # local, waits for them to be healthy, and only then starts the api.
    depends_on:
      elasticsearch:
        condition: service_healthy
      firebase:
        condition: service_healthy
    environment:
      - ENVIRONMENT=local
      - PYTHONUNBUFFERED=1
      - PIPENV_VENV_IN_PROJECT=1
      # The api checkout may carry a developer's .env (host-machine addresses,
      # real keys); pipenv would auto-load it and override this container
      # environment. The compose environment is authoritative here.
      - PIPENV_DONT_LOAD_ENV=1
      # Both overridable so the api can read a deployed cluster instead of the
      # local one — see "Running against real services" in the README. devctl
      # fills GE_DEV_ES_API_KEY from the key es-init minted unless
      # devenv.local.env already set one, so these two always move together.
      # (They have to live here rather than in env_file: an `environment` entry
      # always wins over env_file, so there's no way to make the file the
      # fallback.)
      - GE_ELASTICSEARCH_URL=${GE_DEV_ES_URL:-http://elasticsearch:9200}
      - GE_ELASTICSEARCH_API_KEY=${GE_DEV_ES_API_KEY:-}
      # Ports are the socat-bridged ones (see the firebase service). The
      # project id must match what the emulator runs as, or the api and the
      # frontend read and write different namespaces and the environment
      # looks broken in a confusing way.
      - GE_FIRESTORE_EMULATOR_HOST=firebase:18080
      - GE_FIRESTORE_PROJECT=${GE_DEV_FIREBASE_PROJECT:-greenearth-471522}
      # Lets the Admin SDK verify tokens minted by the Auth emulator instead
      # of reaching for real Google credentials.
      - FIREBASE_AUTH_EMULATOR_HOST=firebase:19099
      - GE_FEED_CONTEXT_SECRET=${GE_DEV_FEED_CONTEXT_SECRET:-ge-dev-feed-context-secret}
      - GE_PROBE_SECRET=${GE_DEV_PROBE_SECRET:-ge-dev-probe}
      # Lets devctl issue requests that the api treats as a genuine signed-in
      # user, which is what writes feed snapshots. A local caller can't mint
      # the AT Protocol JWT the real path needs. The api refuses to start with
      # this set in a deployed environment.
      - GE_DEV_SESSION_SECRET=${GE_DEV_SESSION_SECRET:-ge-dev-session}
      # devctl exports this; it differs from the default only in `external`
      # mode, where it points somewhere this environment doesn't run.
      - GE_INFERENCE_BASE_URL=${GE_DEV_INFERENCE_URL:-http://inference:8000}
      - GE_INFERENCE_API_KEY=${GE_DEV_INFERENCE_API_KEY:-ge-dev-inference}
      - GE_METRICS_EXPORT_INTERVAL_SEC=86400
      # The "your-feed" pipeline runs the `perspective` ranker, which calls
      # Google's Perspective API and hard-fails without a key. Default to the
      # local stub so the feed works out of the box; the key is then just a
      # non-empty placeholder the client requires. `devctl up --live
      # perspective` swaps in the real API (and needs a real key).
      - GE_PERSPECTIVE_HOST=${GE_DEV_PERSPECTIVE_HOST:-http://perspective-stub:8000}
      - GE_PERSPECTIVE_API_KEY=${GE_PERSPECTIVE_API_KEY:-ge-dev-perspective}
      - GE_TIMING_LOGS=${GE_DEV_TIMING_LOGS:-1}
    env_file:
      # Written by seed; devctl guarantees it exists before `up`. The ES key
      # deliberately isn't here — see GE_ELASTICSEARCH_API_KEY above.
      - ./.runtime/probe.env
    ports:
      - "127.0.0.1:${GE_DEV_PORT_API:-8300}:8000"
    volumes:
      - ${GE_DEV_REPO_ROOT:-../..}/api:/app
      - api_venv:/app/.venv

  # Optional: real-time likes from the public Jetstream firehose (issue api#269).
  #
  # Off by default and gated behind a profile, because it's the one service
  # here that needs the internet and never finishes — everything else in this
  # environment runs offline against the fixture. Useful when you're working on
  # ingestion itself, or want the like graph to keep moving.
  #
  #   devctl up --with-jetstream
  #   devctl logs -t jetstream-ingest
  #
  # It writes into the same `likes` index the seed loads, so it adds to the
  # fixture rather than replacing it. Note that the posts those likes point at
  # are mostly *not* in the local index: the firehose covers all of Bluesky,
  # the fixture is a sample of it.
  jetstream-ingest:
    image: golang:1.25
    profiles: ["jetstream"]
    working_dir: /src
    # --max-rewind caps how far back the cursor rewinds after downtime. Without
    # it a container that sat stopped overnight tries to replay every like
    # since, which is a lot of firehose for a laptop.
    command:
      - "go"
      - "run"
      - "./cmd/jetstream_ingest"
      - "--max-rewind"
      - "${GE_DEV_JETSTREAM_MAX_REWIND:-15}"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - GE_ELASTICSEARCH_URL=http://elasticsearch:9200
      - GE_JETSTREAM_URL=${GE_DEV_JETSTREAM_URL:-wss://jetstream2.us-east.bsky.network/subscribe}
      - GE_JETSTREAM_STATE_FILE=/runtime/seed/.jetstream_state.json
      # Matches seed-megastream. The binary's default is 10min, which is right
      # for prod's ILM but would leave a dev container that ran overnight
      # holding ~144 near-empty indices.
      - GE_INDEX_PERIOD=week
    env_file:
      - ./.runtime/es_key_rw.env
    volumes:
      - ${GE_DEV_REPO_ROOT:-../..}/ingex/ingest:/src
      - gomod:/go/pkg/mod
      - gocache:/root/.cache/go-build
      - ./.runtime:/runtime

  # --- seed pipeline (one-shot, `docker compose run --rm <svc>`; devctl seed) ---

  # Rebases fixture timestamps to look recent, into .runtime/seed/.
  seed-rebase:
    image: python:3.13-slim
    profiles: ["tools"]
    command: ["python", "/seedscripts/rebase.py"]
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./seed:/seedscripts:ro
      - ./fixtures/data:/fixtures:ro
      - ./.runtime:/runtime

  # Runs the real megastream_ingest binary (byte-identical to prod) against the
  # rebased fixtures. Uses the read-write ES key minted by es-init.
  seed-megastream:
    image: golang:1.25
    profiles: ["tools"]
    working_dir: /src
    command:
      ["go", "run", "./cmd/megastream_ingest", "--source", "local", "--mode", "once"]
    # No depends_on for inference: in `external` mode there's no local service
    # to depend on, and naming it here would start one anyway. devctl waits for
    # the right service to report healthy before running the seed.
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - GE_LOCAL_SQLITE_DB_PATH=/runtime/seed
      - GE_MEGASTREAM_STATE_FILE=/runtime/seed/.megastream_state.json
      - GE_ELASTICSEARCH_URL=http://elasticsearch:9200
      - GE_INFERENCE_BASE_URL=${GE_DEV_INFERENCE_URL:-http://inference:8000}
      - GE_INFERENCE_API_KEY=${GE_DEV_INFERENCE_API_KEY:-ge-dev-inference}
      - GE_INDEX_PERIOD=week
    env_file:
      - ./.runtime/es_key_rw.env
    volumes:
      - ${GE_DEV_REPO_ROOT:-../..}/ingex/ingest:/src
      - gomod:/go/pkg/mod
      - gocache:/root/.cache/go-build
      - ./.runtime:/runtime

  # Wipes previously seeded data indexes so each seed is a fresh load.
  seed-wipe:
    image: python:3.13-slim
    profiles: ["tools"]
    command: ["python", "/seedscripts/wipe.py"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - GE_ELASTICSEARCH_URL=http://elasticsearch:9200
    env_file:
      - ./.runtime/es_key_rw.env
    volumes:
      - ./seed:/seedscripts:ro

  # Bulk-loads the (rebased) likes fixture and applies per-post like counts.
  seed-likes:
    image: python:3.13-slim
    profiles: ["tools"]
    command: ["python", "/seedscripts/load_likes.py"]
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - GE_ELASTICSEARCH_URL=http://elasticsearch:9200
    env_file:
      - ./.runtime/es_key_rw.env
    volumes:
      - ./seed:/seedscripts:ro
      - ./.runtime:/runtime

volumes:
  esdata:
  api_venv:
  inference_venv:
  gomod:
  gocache:
  # Kept out of the bind-mounted checkout so container installs (Linux
  # binaries, node 24) never collide with what the developer has on the host.
  frontend_node_modules:
  functions_node_modules:
